<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mallik Rasala | Personal Finance</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="app-header">
    <h1>Mallik Rasala</h1>
    <p class="subtitle">Personal Finance Tracker</p>
  </header>

  <main class="container">
    <section class="summary">
      <div class="card income">
        <h2>Income</h2>
        <p id="total-income">$0.00</p>
      </div>
      <div class="card expense">
        <h2>Expenses</h2>
        <p id="total-expense">$0.00</p>
      </div>
      <div class="card balance">
        <h2>Balance</h2>
        <p id="balance">$0.00</p>
      </div>
    </section>

    <section class="form-section">
      <h2>Add Transaction</h2>
      <form id="transaction-form">
        <div class="form-row">
          <input type="text" id="description" placeholder="Description" required />
          <input type="number" id="amount" placeholder="Amount" step="0.01" required />
        </div>
        <div class="form-row">
          <select id="type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
          </select>
          <select id="category">
            <option value="Salary">Salary</option>
            <option value="Food">Food</option>
            <option value="Housing">Housing</option>
            <option value="Transport">Transport</option>
            <option value="Utilities">Utilities</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Health">Health</option>
            <option value="Other">Other</option>
          </select>
          <input type="date" id="date" required />
        </div>
        <button type="submit">Add Transaction</button>
      </form>
    </section>

    <section class="breakdown-section">
      <h2>Spending by Category</h2>
      <canvas id="category-chart" width="400" height="250"></canvas>
    </section>

    <section class="history-section">
      <h2>Transaction History</h2>
      <div class="history-controls">
        <button id="export-btn">Export CSV</button>
        <button id="clear-btn">Clear All</button>
      </div>
      <table id="transaction-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Description</th>
            <th>Category</th>
            <th>Type</th>
            <th>Amount</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="transaction-list"></tbody>
      </table>
    </section>
  </main>

  <footer class="app-footer">
    <p>Mallik Rasala &mdash; Data is stored locally in your browser</p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
